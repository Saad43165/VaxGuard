name: vax_guard

description: VaxGuard - Professional Vaccine Management & Health Assistant App
version: 1.0.0+1

environment:
  sdk: ">=2.17.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.4.9

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

  # Charts
  fl_chart: ^0.66.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # UI & Fonts
  google_fonts: ^6.2.1
  animations: ^2.0.11
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.6

  # Utilities
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  uuid: ^4.4.0
  url_launcher: ^6.3.0
  permission_handler: ^11.3.1
  geolocator: ^12.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

